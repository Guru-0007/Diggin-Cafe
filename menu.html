<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coffee House | Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { brand: { dark: '#1c1917', light: '#f5f5f4', accent: '#d97706', accentHover: '#b45309' } }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-brand-light font-sans antialiased flex flex-col min-h-screen selection:bg-brand-accent selection:text-white">

    <!-- Sticky Navbar -->
    <nav class="fixed w-full z-40 bg-brand-dark/95 backdrop-blur-md border-b border-stone-800 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold tracking-tighter text-brand-accent hover:text-brand-accentHover transition-colors">
                        THE COFFEE HOUSE
                    </a>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="hidden md:flex space-x-8 mr-4">
                        <a href="index.html" class="hover:text-brand-accent px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
                        <a href="menu.html" class="text-brand-accent px-3 py-2 rounded-md text-sm font-medium">Menu</a>
                    </div>
                    <!-- Cart Button -->
                    <button id="cart-toggle" class="relative p-2 text-white hover:text-brand-accent transition-colors flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span id="cart-count" class="absolute top-0 right-0 -mt-1 -mr-1 bg-brand-accent text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-lg">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Menu Header -->
    <div class="pt-28 pb-12 bg-stone-950 text-center border-b border-stone-800">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Our Menu</h1>
            <p class="text-stone-400 text-lg">Tap to add items to your cart.</p>
        </div>
    </div>

    <!-- Menu Content -->
    <main class="flex-grow py-12">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="loading-state" class="text-center py-12"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-brand-accent mb-4"></div></div>
            <div id="error-state" class="hidden text-center py-12 text-red-400"><p>Oops! Couldn't load the menu.</p></div>
            <div id="menu-container" class="space-y-20 hidden"></div>
        </div>
    </main>

    <footer class="bg-stone-950 border-t border-stone-800 pt-12 pb-8 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-stone-500 text-sm">
            <p>&copy; 2026 The Coffee House.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coffee House | Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    colors: {
                        cafe: {
                            bg: '#1c1917', card: '#292524', text: '#fefce8', muted: '#a8a29e', accent: '#d97706', accentHover: '#b45309',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cafe-bg text-cafe-text font-sans antialiased flex flex-col min-h-screen selection:bg-cafe-accent selection:text-white">

    <!-- Sticky Navbar -->
    <nav class="fixed w-full z-40 bg-cafe-bg/90 backdrop-blur-lg border-b border-white/5 py-2 transition-all">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-3xl font-serif font-bold tracking-tighter text-cafe-accent hover:text-cafe-accentHover transition-colors">
                        The Coffee House
                    </a>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="hidden md:flex space-x-10 mr-6">
                        <a href="index.html" class="hover:text-cafe-accent px-3 py-2 text-sm font-bold uppercase tracking-widest transition-colors">Home</a>
                        <a href="menu.html" class="text-cafe-accent px-3 py-2 text-sm font-bold uppercase tracking-widest transition-colors">Menu</a>
                    </div>
                    <!-- Cart Button -->
                    <button id="cart-toggle" class="relative p-2 text-white hover:text-cafe-accent transition-colors flex items-center gap-2 group">
                        <div class="p-3 bg-white/5 rounded-full group-hover:bg-cafe-accent/10 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <span id="cart-count" class="absolute top-1 right-1 bg-cafe-accent text-white text-[11px] font-bold px-2 py-0.5 rounded-full shadow-lg border-2 border-cafe-bg">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Menu Header -->
    <div class="pt-36 pb-16 bg-cafe-bg text-center border-b border-white/5">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-serif italic text-white mb-6">Our Menu</h1>
            <p class="text-cafe-muted text-xl font-light">Explore our premium selection and add to your cart to order.</p>
        </div>
    </div>

    <!-- Menu Content -->
    <main class="flex-grow py-20 bg-cafe-card">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div id="loading-state" class="text-center py-20"><div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-cafe-accent mb-4"></div></div>
            <div id="error-state" class="hidden text-center py-20 text-red-400"><p>Oops! Couldn't load the menu.</p></div>
            <div id="menu-container" class="space-y-32 hidden"></div>
        </div>
    </main>

    <footer class="bg-black border-t border-white/10 pt-16 pb-12 mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center text-white/30 text-xs font-bold tracking-[0.2em] uppercase">
            <p>&copy; 2026 Premium Digital Ordering.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>

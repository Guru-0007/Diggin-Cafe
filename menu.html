<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coffee House | Menu</title>
    <meta name="description" content="View our delicious menu of coffees and snacks.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#1c1917', // stone-900
                            light: '#f5f5f4', // stone-100
                            accent: '#d97706', // amber-600
                            accentHover: '#b45309', // amber-700
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-brand-light font-sans antialiased flex flex-col min-h-screen selection:bg-brand-accent selection:text-white">

    <!-- Sticky Navbar -->
    <nav class="fixed w-full z-50 bg-brand-dark/95 backdrop-blur-md border-b border-stone-800 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold tracking-tighter text-brand-accent hover:text-brand-accentHover transition-colors">
                        THE COFFEE HOUSE
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="hover:text-brand-accent px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
                        <a href="menu.html" class="text-brand-accent px-3 py-2 rounded-md text-sm font-medium transition-colors">Menu</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Social Proof Banner -->
    <div class="pt-20 bg-stone-950/80 border-b border-stone-800 text-center py-2 text-xs font-semibold tracking-widest uppercase text-stone-400">
        ⭐ Serving 200+ customers daily ⭐
    </div>

    <!-- Menu Header -->
    <div class="pt-16 pb-12 bg-gradient-to-b from-stone-950 to-brand-dark text-center">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">Our Menu</h1>
            <p class="text-stone-400 text-lg md:text-xl font-light">Freshly prepared, just for you.</p>
        </div>
    </div>

    <!-- Menu Content (Dynamic) -->
    <main class="flex-grow py-12 md:py-20">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Loading State -->
            <div id="loading-state" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-brand-accent mb-4"></div>
                <p class="text-stone-400">Loading delicious items...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center py-12 text-red-400 bg-red-900/10 rounded-2xl border border-red-900/30">
                <p class="font-medium">Oops! Couldn't load the menu right now.</p>
            </div>

            <!-- Menu Container where JS will inject content -->
            <div id="menu-container" class="space-y-24 hidden">
                <!-- Categories will be injected here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-stone-950 border-t border-stone-800 pt-16 pb-12 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-stone-500 text-sm">
            <p>&copy; 2026 The Coffee House. All rights reserved.</p>
        </div>
    </footer>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/919999999999?text=Hi%20I%20want%20to%20order" target="_blank" class="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white py-3 px-5 rounded-full shadow-2xl hover:bg-[#20b858] transition-all hover:scale-105 hover:-translate-y-1 flex items-center justify-center group font-bold tracking-wide gap-2 border border-[#1da851]" aria-label="Order on WhatsApp">
        <svg fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
        </svg>
        Order
    </a>

    <script src="js/script.js"></script>
</body>
</html>

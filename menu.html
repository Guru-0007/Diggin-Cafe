<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggin Café | Menu</title>
    <meta name="description" content="Browse the full Diggin menu — handcrafted pastas, stone-baked pizzas, signature brews, and indulgent desserts. Order digitally from your table.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: {
                        cafe: { bg: '#0f0f0f', card: '#1a1714', surface: '#252220', text: '#faf6f1', muted: '#9c9590', accent: '#c8873a', accentHover: '#a66e2a', warm: '#3d342c' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cafe-card text-cafe-text font-sans antialiased flex flex-col min-h-screen selection:bg-cafe-accent selection:text-white overflow-x-hidden">

    <nav class="fixed w-full z-40 bg-cafe-bg/85 backdrop-blur-xl border-b border-white/[0.04] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex items-center justify-between h-20">
                <a href="index" class="text-2xl md:text-3xl font-serif italic text-cafe-accent hover:text-cafe-accentHover transition-colors tracking-tight">Diggin</a>
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="hidden md:flex items-center gap-1">
                        <a href="index" class="text-cafe-muted hover:text-cafe-accent px-4 py-2 text-[13px] font-semibold uppercase tracking-[0.15em] transition-colors">Home</a>
                        <a href="menu" class="text-cafe-accent px-4 py-2 text-[13px] font-semibold uppercase tracking-[0.15em]">Menu</a>
                    </div>
                    <div class="theme-toggle" title="Toggle theme">
                        <div class="theme-toggle-thumb"><span class="theme-toggle-icon">🌙</span></div>
                    </div>
                    <button id="cart-toggle" class="relative p-3 text-cafe-muted hover:text-cafe-accent transition-colors group ml-2" aria-label="View order tray">
                        <div class="p-2.5 bg-white/[0.04] rounded-full group-hover:bg-cafe-accent/10 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3C7.03 3 3 5.69 3 9h18c0-3.31-4.03-6-9-6z"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 9v1a1 1 0 001 1h16a1 1 0 001-1V9"/><path stroke-linecap="round" stroke-linejoin="round" d="M5 11v6a2 2 0 002 2h10a2 2 0 002-2v-6"/><line x1="12" y1="1" x2="12" y2="3" stroke-linecap="round"/></svg>
                        </div>
                        <span class="cart-count-badge absolute top-2 right-2 bg-cafe-accent text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center shadow-lg border-2 border-cafe-bg">0</span>
                    </button>
                    <button id="mobile-menu-toggle" class="md:hidden p-3 text-cafe-muted hover:text-cafe-accent transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden pb-6 border-t border-white/5 mt-2 pt-4">
                <a href="index" class="block py-3 text-cafe-muted hover:text-cafe-accent text-sm font-semibold uppercase tracking-[0.15em] transition-colors">Home</a>
                <a href="menu" class="block py-3 text-cafe-accent text-sm font-semibold uppercase tracking-[0.15em]">Menu</a>
            </div>
        </div>
    </nav>

    <div class="pt-28 pb-14 bg-cafe-bg text-center border-b border-white/[0.04]">
        <div class="max-w-4xl mx-auto px-6">
            <div class="flex items-center justify-center gap-3 mb-6">
                <div class="w-8 h-px bg-cafe-accent"></div>
                <span class="text-cafe-accent text-xs font-bold uppercase tracking-[0.3em]">Italian & Continental</span>
                <div class="w-8 h-px bg-cafe-accent"></div>
            </div>
            <h1 class="text-5xl md:text-6xl font-serif italic text-cafe-text mb-5">Our Menu</h1>
            <p class="text-cafe-muted text-lg font-light max-w-md mx-auto">Handcrafted with love. Tap any item to add it to your order — we'll bring it to your table.</p>
        </div>
    </div>

    <main class="flex-grow py-16 md:py-24">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div id="loading-state" class="text-center py-24">
                <div class="spinner mx-auto mb-6" style="width:40px;height:40px;border-width:3px;"></div>
                <p class="text-cafe-muted font-light">Loading our menu...</p>
            </div>
            <div id="error-state" class="hidden text-center py-24">
                <div class="text-5xl mb-4 opacity-30">😕</div>
                <p class="text-red-400/80 font-light mb-4">Couldn't load the menu right now.</p>
                <button onclick="location.reload()" class="px-6 py-3 bg-cafe-accent text-white rounded-xl font-bold text-sm uppercase tracking-wider">Try Again</button>
            </div>
            <div id="menu-container" class="space-y-24 hidden"></div>
        </div>
    </main>

    <footer class="bg-cafe-bg border-t border-white/[0.04] py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-cafe-muted/50 text-xs font-medium uppercase tracking-[0.2em]">&copy; 2026 Diggin Café · <a href="https://diggin.co.in" target="_blank" class="hover:text-cafe-accent transition-colors">diggin.co.in</a></p>
        </div>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>

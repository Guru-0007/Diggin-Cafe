<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Dashboard | The Coffee House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    colors: {
                        cafe: {
                            bg: '#1a1714',
                            card: '#252220',
                            surface: '#2e2a27',
                            text: '#faf6f1',
                            muted: '#9c9590',
                            accent: '#c8873a',
                            accentHover: '#a66e2a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cafe-bg text-cafe-text font-sans antialiased min-h-screen selection:bg-cafe-accent selection:text-white">

    <!-- Login Gate -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center bg-cafe-bg p-6">
        <div class="bg-cafe-card p-10 rounded-[2rem] border border-white/[0.06] shadow-2xl w-full max-w-sm text-center">
            <div class="w-14 h-14 mx-auto bg-cafe-accent/10 text-cafe-accent rounded-2xl flex items-center justify-center mb-6 border border-cafe-accent/15">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-3xl font-serif italic text-cafe-text mb-2">Chef Access</h2>
            <p class="text-cafe-muted text-sm font-light mb-8">Enter password to view live orders.</p>
            <form id="login-form" class="space-y-4">
                <input type="password" id="password" required class="w-full bg-cafe-bg border border-white/[0.06] rounded-xl px-5 py-4 text-cafe-text text-center text-lg tracking-[0.3em] focus:outline-none focus:border-cafe-accent/60 transition-colors placeholder-cafe-muted/30" placeholder="••••••••">
                <button type="submit" class="w-full py-4 bg-cafe-accent hover:bg-cafe-accentHover text-white font-bold uppercase tracking-[0.12em] rounded-xl transition-all shadow-lg text-sm">Login</button>
                <p id="login-error" class="text-red-400/80 text-sm hidden mt-2">Incorrect password. Try again.</p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-view" class="hidden min-h-screen flex flex-col">
        <!-- Top Bar -->
        <nav class="bg-cafe-card border-b border-white/[0.04] px-6 py-4 flex justify-between items-center sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-serif italic text-cafe-accent">Chef Dashboard</h1>
                <a href="cashier.html" class="text-cafe-muted text-xs font-bold uppercase tracking-[0.12em] hover:text-cafe-accent transition-colors px-3 py-1.5 border border-white/[0.06] rounded-lg hover:border-cafe-accent/30">Cashier →</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                    </span>
                    <span class="text-xs font-bold text-cafe-muted uppercase tracking-[0.15em]">Live</span>
                </div>
                <button id="logout-btn" class="px-4 py-2 border border-white/[0.06] hover:bg-white/[0.04] rounded-lg text-xs font-bold text-cafe-muted hover:text-cafe-text transition-colors uppercase tracking-[0.12em]">Logout</button>
            </div>
        </nav>

        <!-- Call Alerts Banner -->
        <div id="calls-banner" class="hidden bg-red-500/10 border-b border-red-500/20 px-6 py-3">
            <div class="max-w-7xl mx-auto flex items-center gap-3">
                <svg class="w-5 h-5 text-red-400 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <span class="text-red-300 text-sm font-bold uppercase tracking-wider">Service Calls</span>
                <div id="calls-list" class="flex items-center gap-2 ml-2 flex-wrap"></div>
            </div>
        </div>

        <main class="flex-grow p-6 md:p-10">
            <!-- Tab filters -->
            <div class="flex flex-wrap gap-3 mb-8">
                <button class="chef-tab active px-5 py-2.5 rounded-xl text-sm font-bold uppercase tracking-[0.1em] bg-cafe-accent text-white transition-all" data-status="pending,preparing">Active</button>
                <button class="chef-tab px-5 py-2.5 rounded-xl text-sm font-bold uppercase tracking-[0.1em] bg-white/[0.04] text-cafe-muted border border-white/[0.06] hover:bg-cafe-accent/20 hover:text-cafe-accent transition-all" data-status="pending">Pending</button>
                <button class="chef-tab px-5 py-2.5 rounded-xl text-sm font-bold uppercase tracking-[0.1em] bg-white/[0.04] text-cafe-muted border border-white/[0.06] hover:bg-cafe-accent/20 hover:text-cafe-accent transition-all" data-status="preparing">Preparing</button>
                <button class="chef-tab px-5 py-2.5 rounded-xl text-sm font-bold uppercase tracking-[0.1em] bg-white/[0.04] text-cafe-muted border border-white/[0.06] hover:bg-cafe-accent/20 hover:text-cafe-accent transition-all" data-status="ready">Ready</button>
            </div>

            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 mb-10">
                <div>
                    <h2 class="text-3xl md:text-4xl font-bold text-cafe-text tracking-tight">Active Orders</h2>
                    <p class="text-cafe-muted text-sm mt-2 font-light">Real-time Supabase sync. Orders appear instantly.</p>
                </div>
                <div class="text-lg font-bold bg-cafe-card border border-white/[0.04] px-5 py-3 rounded-xl flex items-center gap-2">
                    <span id="order-count" class="text-cafe-accent text-2xl">0</span>
                    <span class="text-cafe-muted text-sm">orders</span>
                </div>
            </div>

            <!-- Orders Grid -->
            <div id="orders-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"></div>

            <!-- Empty State -->
            <div id="no-orders" class="hidden text-center py-24 mt-6 border-2 border-dashed border-white/[0.06] rounded-[2rem] bg-cafe-card/30">
                <div class="text-5xl mb-4 opacity-20">🍽️</div>
                <h3 class="text-xl font-bold text-cafe-muted/60 mb-2">No Active Orders</h3>
                <p class="text-cafe-muted/40 text-sm font-light">Waiting for customers to place an order...</p>
            </div>
        </main>
    </div>

    <!-- Audio notification -->
    <audio id="notification-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRigBAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQBAADg/+D/4P/g/+D/4P/g/+D/4P/g/+D/8P/w//D/8P/w//D/8P/w//D/8P8AAAAAAAAAAAAAAAAAAAAAAAAAABAAEAAQABAAEAAQABAAEAAQABAAIAAgACAAIAAgACAAIAAgACAAIAAgADAAMAAwADAAMAAwADAAMAAwADAAMAAgACAAIAAgACAAIAAgACAAEAAQABAAEAAQAAAAAAAAAAAAAAAAAAAAAAAAAPA/8P/w//D/8P/w/+D/4P/g/+D/4P/g/9D/0P/Q/9D/0P/Q/8D/wP/A/8D/wP/A/8D/wP/A/8D/wP/Q/9D/0P/Q/9D/0P/g/+D/4P/g/+D/4P/w//D/8P/w//D/8P8=" type="audio/wav">
    </audio>

    <script src="js/supabase-config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginView = document.getElementById("login-view");
            const dashboardView = document.getElementById("dashboard-view");
            const err = document.getElementById("login-error");
            let currentFilter = ['pending', 'preparing'];
            let orderChannel = null;
            let callChannel = null;

            // Restore session
            if (sessionStorage.getItem("chef_auth") === "true") {
                showDashboard();
            }

            // Login
            document.getElementById("login-form").addEventListener("submit", (e) => {
                e.preventDefault();
                if (document.getElementById("password").value === "admin123") {
                    sessionStorage.setItem("chef_auth", "true");
                    document.getElementById("password").value = "";
                    err.classList.add("hidden");
                    showDashboard();
                } else {
                    err.classList.remove("hidden");
                }
            });

            // Logout
            document.getElementById("logout-btn").addEventListener("click", () => {
                sessionStorage.removeItem("chef_auth");
                dashboardView.classList.add("hidden");
                loginView.classList.remove("hidden");
                if (orderChannel) supabase.removeChannel(orderChannel);
                if (callChannel) supabase.removeChannel(callChannel);
            });

            // Tab filters
            document.querySelectorAll('.chef-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chef-tab').forEach(b => {
                        b.classList.remove('bg-cafe-accent', 'text-white', 'active');
                        b.classList.add('bg-white/[0.04]', 'text-cafe-muted');
                    });
                    btn.classList.add('bg-cafe-accent', 'text-white', 'active');
                    btn.classList.remove('bg-white/[0.04]', 'text-cafe-muted');
                    const status = btn.dataset.status;
                    currentFilter = status.includes(',') ? status.split(',') : [status];
                    renderOrders();
                });
            });

            async function showDashboard() {
                loginView.classList.add("hidden");
                dashboardView.classList.remove("hidden");
                await renderOrders();
                await renderCalls();

                // Real-time subscription for orders
                orderChannel = subscribeToOrders((payload) => {
                    renderOrders();
                    if (payload.eventType === 'INSERT') {
                        playNotification();
                    }
                });

                // Real-time subscription for calls
                callChannel = subscribeToCalls(() => {
                    renderCalls();
                    playNotification();
                });
            }

            function playNotification() {
                try {
                    const audio = document.getElementById('notification-sound');
                    audio.currentTime = 0;
                    audio.play().catch(() => {});
                } catch(e) {}
            }

            window.setOrderStatus = async function(orderId, newStatus) {
                try {
                    await updateOrderStatus(orderId, newStatus);
                    await renderOrders();
                } catch (err) {
                    console.error('Failed to update order:', err);
                }
            };

            window.handleDismissCall = async function(callId) {
                try {
                    await dismissCall(callId);
                    await renderCalls();
                } catch(err) {
                    console.error('Failed to dismiss call:', err);
                }
            };

            async function renderCalls() {
                const banner = document.getElementById('calls-banner');
                const list = document.getElementById('calls-list');
                const calls = await fetchActiveCalls();

                if (calls.length === 0) {
                    banner.classList.add('hidden');
                    return;
                }

                banner.classList.remove('hidden');
                list.innerHTML = calls.map(call => `
                    <div class="flex items-center gap-2 bg-red-500/20 border border-red-500/30 text-red-200 text-xs font-bold px-3 py-1.5 rounded-lg alert-flash">
                        <span>Table ${call.table_number} — ${call.type}</span>
                        <button onclick="handleDismissCall('${call.id}')" class="ml-1 text-red-300 hover:text-white transition-colors">✕</button>
                    </div>
                `).join('');
            }

            async function renderOrders() {
                const container = document.getElementById("orders-container");
                const noOrders = document.getElementById("no-orders");
                const countEl = document.getElementById("order-count");

                const orders = await fetchOrders(currentFilter);
                countEl.textContent = orders.length;

                if (orders.length === 0) {
                    container.innerHTML = "";
                    noOrders.classList.remove("hidden");
                    return;
                }

                noOrders.classList.add("hidden");
                container.innerHTML = "";

                orders.forEach(order => {
                    const card = document.createElement("div");
                    card.className = "bg-cafe-card rounded-2xl border border-white/[0.04] overflow-hidden flex flex-col shadow-xl hover:border-cafe-accent/20 transition-colors order-card-enter";

                    const items = order.items || [];
                    const itemsHtml = items.map(item => `
                        <div class="flex justify-between items-center py-2.5 border-b border-white/[0.03] last:border-0">
                            <span class="text-cafe-text text-sm"><span class="font-bold text-cafe-accent">${item.quantity}×</span> ${item.name}</span>
                            <span class="text-cafe-muted text-sm font-medium">₹${item.price * item.quantity}</span>
                        </div>
                    `).join("");

                    const statusColors = {
                        pending: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                        preparing: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                        ready: 'bg-green-500/20 text-green-400 border-green-500/30'
                    };
                    const statusClass = statusColors[order.status] || statusColors.pending;

                    const time = order.created_at ? new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                    const customerName = order.customer_name || 'Customer';

                    let actionBtns = '';
                    if (order.status === 'pending') {
                        actionBtns = `
                            <button onclick="setOrderStatus('${order.id}', 'preparing')" class="px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold uppercase tracking-[0.1em] rounded-xl transition-all shadow-lg flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                Preparing
                            </button>
                        `;
                    } else if (order.status === 'preparing') {
                        actionBtns = `
                            <button onclick="setOrderStatus('${order.id}', 'ready')" class="px-4 py-2.5 bg-green-600 hover:bg-green-500 text-white text-xs font-bold uppercase tracking-[0.1em] rounded-xl transition-all shadow-lg flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                Ready
                            </button>
                        `;
                    } else if (order.status === 'ready') {
                        actionBtns = `
                            <span class="text-green-400 text-xs font-bold uppercase tracking-wider flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                Ready for pickup
                            </span>
                        `;
                    }

                    card.innerHTML = `
                        <div class="p-6 bg-cafe-bg border-b border-white/[0.04] flex justify-between items-center">
                            <div>
                                <div class="text-[10px] font-bold text-cafe-accent uppercase tracking-[0.2em] mb-1">Table ${order.table_number}</div>
                                <h3 class="text-lg font-bold text-cafe-text">${customerName}</h3>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                <span class="inline-flex px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border ${statusClass}">
                                    ${order.status}
                                </span>
                                <div class="text-cafe-muted/50 font-mono text-xs">${time}</div>
                            </div>
                        </div>
                        <div class="p-6 flex-grow">${itemsHtml}</div>
                        <div class="p-6 bg-cafe-bg border-t border-white/[0.04] flex justify-between items-center">
                            <div>
                                <div class="text-[10px] font-bold text-cafe-muted/50 uppercase tracking-[0.2em] mb-1">Total</div>
                                <div class="text-2xl font-bold text-cafe-accent">₹${order.total}</div>
                            </div>
                            ${actionBtns}
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Dashboard | The Coffee House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { brand: { dark: '#1c1917', light: '#f5f5f4', accent: '#d97706', accentHover: '#b45309' } }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-950 text-brand-light font-sans antialiased min-h-screen selection:bg-brand-accent selection:text-white">

    <!-- Login View -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center bg-stone-950 p-4">
        <div class="bg-stone-900 p-8 rounded-3xl border border-stone-800 shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Chef Login</h2>
            <p class="text-stone-400 mb-8 font-light">Enter master password to view orders.</p>
            <form id="login-form">
                <input type="password" id="password" required class="w-full bg-stone-800 border border-stone-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accent transition-colors text-center font-mono letter-spacing-2 mb-6" placeholder="••••••••">
                <button type="submit" class="w-full py-4 bg-brand-accent hover:bg-brand-accentHover text-white font-bold uppercase tracking-widest rounded-xl transition-all shadow-lg">Login</button>
                <p id="login-error" class="text-red-400 text-sm mt-4 hidden">Incorrect password.</p>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="hidden min-h-screen flex flex-col">
        <nav class="bg-stone-900 border-b border-stone-800 px-6 py-4 flex justify-between items-center shadow-lg sticky top-0 z-30">
            <h1 class="text-2xl font-bold text-brand-accent tracking-tighter">CHEF DASHBOARD</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-sm font-bold text-stone-400 uppercase tracking-widest">Live Updates</span>
                </div>
                <button id="logout-btn" class="ml-4 px-4 py-2 border border-stone-700 hover:bg-stone-800 rounded-lg text-sm font-bold text-stone-300 transition-colors uppercase tracking-wider">Logout</button>
            </div>
        </nav>

        <main class="flex-grow p-6 md:p-10">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-4xl font-bold text-white tracking-tight">Active Orders</h2>
                    <p class="text-stone-400 mt-2">Manage customer requests below.</p>
                </div>
                <div class="text-xl font-bold bg-stone-900 border border-stone-800 px-6 py-3 rounded-2xl">
                    <span id="order-count" class="text-brand-accent">0</span> pending
                </div>
            </div>

            <!-- Orders Grid -->
            <div id="orders-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Injected via JS -->
            </div>
            
            <div id="no-orders" class="hidden text-center py-20 mt-10 border-2 border-dashed border-stone-800 rounded-3xl bg-stone-900/50">
                <svg class="w-16 h-16 mx-auto text-stone-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <h3 class="text-2xl font-bold text-stone-500 mb-2">No Active Orders</h3>
                <p class="text-stone-600">Waiting for customers to place an order...</p>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginView = document.getElementById("login-view");
            const dashboardView = document.getElementById("dashboard-view");
            const err = document.getElementById("login-error");
            
            // Check auth state
            if(sessionStorage.getItem("chef_auth") === "true") {
                showDashboard();
            }

            document.getElementById("login-form").addEventListener("submit", (e) => {
                e.preventDefault();
                if(document.getElementById("password").value === "admin123") {
                    sessionStorage.setItem("chef_auth", "true");
                    document.getElementById("password").value = "";
                    err.classList.add("hidden");
                    showDashboard();
                } else {
                    err.classList.remove("hidden");
                }
            });

            document.getElementById("logout-btn").addEventListener("click", () => {
                sessionStorage.removeItem("chef_auth");
                dashboardView.classList.add("hidden");
                loginView.classList.remove("hidden");
                clearInterval(window.orderPoller);
            });
            
            function showDashboard() {
                loginView.classList.add("hidden");
                dashboardView.classList.remove("hidden");
                renderOrders();
                // Poll every 3 seconds for new orders
                window.orderPoller = setInterval(renderOrders, 3000);
            }

            window.completeOrder = function(orderId) {
                let orders = JSON.parse(localStorage.getItem("cafe_orders")) || [];
                orders = orders.filter(o => o.id !== orderId);
                localStorage.setItem("cafe_orders", JSON.stringify(orders));
                renderOrders();
            }

            function renderOrders() {
                const container = document.getElementById("orders-container");
                const noOrders = document.getElementById("no-orders");
                const count = document.getElementById("order-count");
                
                let orders = JSON.parse(localStorage.getItem("cafe_orders")) || [];
                count.textContent = orders.length;

                if(orders.length === 0) {
                    container.innerHTML = "";
                    noOrders.classList.remove("hidden");
                    return;
                }
                
                noOrders.classList.add("hidden");
                container.innerHTML = "";
                
                // Sort oldest first
                orders.forEach(order => {
                    const card = document.createElement("div");
                    card.className = "bg-stone-900 rounded-3xl border border-stone-800 overflow-hidden flex flex-col shadow-xl";
                    
                    let itemsHtml = order.items.map(item => `
                        <div class="flex justify-between items-center py-2 border-b border-stone-800/50 last:border-0">
                            <span class="text-stone-300"><span class="font-bold text-white">${item.quantity}x</span> ${item.name}</span>
                            <span class="text-stone-500 text-sm">₹${item.price * item.quantity}</span>
                        </div>
                    `).join("");

                    card.innerHTML = `
                        <div class="p-6 bg-stone-950 border-b border-stone-800 flex justify-between items-center">
                            <div>
                                <div class="text-xs font-bold text-brand-accent uppercase tracking-widest mb-1">Table ${order.table}</div>
                                <h3 class="text-xl font-bold text-white">${order.customer}</h3>
                            </div>
                            <div class="text-right">
                                <div class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-1">Time</div>
                                <div class="text-white font-mono text-lg">${order.timestamp}</div>
                            </div>
                        </div>
                        <div class="p-6 flex-grow">
                            ${itemsHtml}
                        </div>
                        <div class="p-6 bg-stone-950 border-t border-stone-800 mt-auto flex justify-between items-center">
                            <div>
                                <div class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-1">Total</div>
                                <div class="text-2xl font-bold text-brand-accent tracking-tighter">₹${order.total}</div>
                            </div>
                            <button onclick="completeOrder('${order.id}')" class="px-6 py-3 bg-[#25D366] hover:bg-[#20b858] text-white font-bold uppercase tracking-widest rounded-xl transition-all shadow-lg flex items-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                Complete
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
